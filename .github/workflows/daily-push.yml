name: AI News Daily Push

on:
  schedule:
    # 每天北京时间 9:00 (UTC 1:00)
    - cron: '0 1 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  push-news:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        pip install requests schedule
        
    - name: Run AI News Bot
      env:
        DINGTALK_TOKEN: ${{ secrets.DINGTALK_TOKEN }}
      run: python ai_news_bot.py
